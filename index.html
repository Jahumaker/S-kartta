<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suomen Sääkartta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100vw; height:100vh; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:#101520; color:#e0e6ed; }
#app { width:100vw; height:100vh; display:flex; flex-direction:column; }

/* Header */
#header {
  height:80px; background:linear-gradient(135deg,#1a237e 0%,#0d47a1 50%,#01579b 100%);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 30px; flex-shrink:0;
  border-bottom:3px solid #4fc3f7;
  box-shadow:0 4px 20px #0008;
}
#header h1 { font-size:30px; font-weight:700; color:#fff; letter-spacing:1px; }
.header-right { text-align:right; }
.clock { font-size:38px; font-weight:300; color:#4fc3f7; font-variant-numeric:tabular-nums; }
.date { font-size:14px; color:#ffffffaa; margin-top:1px; }

/* Map sections — 3 equal maps filling available space */
.map-section { position:relative; flex:1 1 0; min-height:0; overflow:hidden; }
#map-fc-temp { border-top:2px solid #1a237e; }
#map-fc-rain { border-top:2px solid #1a237e; }
.map-div { width:100%; height:100%; }

.section-title {
  position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:1000;
  background:#1a237eee; border:1px solid #4fc3f7; border-radius:8px;
  padding:6px 20px; font-size:18px; font-weight:700; color:#fff;
  letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
}

.map-legend {
  position:absolute; bottom:10px; left:10px; z-index:1000;
  background:#101520ee; border:1px solid #2a323c; border-radius:10px;
  padding:10px 14px; font-size:13px; backdrop-filter:blur(8px);
}
.legend-title { font-weight:700; margin-bottom:6px; font-size:14px; color:#fff; }
.legend-row { display:flex; align-items:center; gap:8px; margin-bottom:3px; color:#ccc; }
.legend-color { width:20px; height:14px; border-radius:3px; }

.status-overlay {
  position:absolute; top:10px; right:10px; z-index:1000;
  background:#101520dd; border:1px solid #2a323c; border-radius:8px;
  padding:6px 14px; font-size:13px; color:#a6adbb; backdrop-filter:blur(8px);
}
.fmi-credit {
  position:absolute; bottom:10px; right:10px; z-index:1000;
  background:#101520dd; border:1px solid #2a323c; border-radius:8px;
  padding:4px 12px; font-size:11px; color:#a6adbb88;
}

/* Rain legend */
.rain-legend {
  position:absolute; bottom:10px; left:10px; z-index:1000;
  background:#101520ee; border:1px solid #2a323c; border-radius:10px;
  padding:10px 14px; font-size:13px; backdrop-filter:blur(8px);
}

/* Summary strip */
#summary-strip {
  display:flex; height:60px; flex-shrink:0;
  background:linear-gradient(135deg,#1a237e 0%,#0d47a1 100%);
  border-top:2px solid #4fc3f7;
}
.summary-box {
  flex:1; display:flex; align-items:center; justify-content:center;
  border-right:1px solid #ffffff22; gap:8px;
}
.summary-box:last-child { border-right:none; }
.summary-icon { font-size:20px; }
.summary-value { font-size:22px; font-weight:800; }
.summary-label { font-size:11px; color:#ffffffaa; text-transform:uppercase; letter-spacing:1px; }
.summary-detail { font-size:11px; color:#ffffff77; }

/* Station markers */
.station-marker {
  border-radius:50%; border:2px solid #fff4;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#fff;
  text-shadow:0 1px 4px #000c;
  box-shadow:0 3px 10px #0006;
}
.station-label {
  position:absolute; top:-16px; left:50%; transform:translateX(-50%);
  white-space:nowrap; font-size:10px; font-weight:600;
  color:#fff; text-shadow:0 1px 4px #000, 0 0 8px #000;
  pointer-events:none;
}
/* Forecast markers */
.fc-marker {
  border-radius:50%; border:2px solid #fff4;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#fff;
  text-shadow:0 1px 4px #000c;
  box-shadow:0 3px 10px #0006;
}
.fc-label {
  position:absolute; top:-15px; left:50%; transform:translateX(-50%);
  white-space:nowrap; font-size:10px; font-weight:600;
  color:#fff; text-shadow:0 1px 4px #000, 0 0 8px #000;
  pointer-events:none;
}

/* Leaflet overrides */
.leaflet-popup-content-wrapper { background:#1d232a !important; color:#a6adbb !important; border-radius:10px !important; }
.leaflet-popup-tip { background:#1d232a !important; }

#error-bar { position:absolute; top:40px; left:50%; transform:translateX(-50%); z-index:1000;
  background:#ef444433; border:1px solid #ef4444; border-radius:8px;
  padding:8px 16px; font-size:13px; color:#ef4444; display:none; max-width:80%; text-align:center; }
#error-bar.visible { display:block; }
</style>
</head>

<div id="app">
  <div id="header">
    <h1>&#x1F1EB;&#x1F1EE; Suomen S&auml;&auml;</h1>
    <div class="header-right">
      <div class="clock" id="clock">--:--</div>

    <div class="map-legend">
      <div class="legend-title">L&auml;mp&ouml;tila &deg;C</div>
      <div class="legend-row"><div class="legend-color" style="background:#3b82f6"></div> &lt; 0</div>
      <div class="legend-row"><div class="legend-color" style="background:#10b981"></div> 0 &ndash; 10</div>
      <div class="legend-row"><div class="legend-color" style="background:#f59e0b"></div> 10 &ndash; 20</div>

      <div class="legend-row"><div class="legend-color" style="background:#991b1b"></div> &gt; 30</div>

    <div class="status-overlay" id="status-bar">Ladataan...</div>
    <div id="error-bar"></div>
    <div class="fmi-credit">L&auml;hde: Ilmatieteen laitos</div>
  </div>

  <!-- Temperature forecast map -->
  <div class="map-section" id="map-fc-temp">
    <div class="map-div" id="map2"></div>
    <div class="section-title" id="fc-temp-title">&#x1F525; L&auml;mp&ouml;tilaennuste 24h</div>
  </div>

  <!-- Precipitation forecast map -->
  <div class="map-section" id="map-fc-rain">
    <div class="map-div" id="map3"></div>
    <div class="section-title" id="fc-rain-title">&#x1F327;&#xFE0F; Sade-ennuste 24h (mm)</div>

      <div class="legend-row"><div class="legend-color" style="background:#2563eb"></div> 2 &ndash; 5</div>
      <div class="legend-row"><div class="legend-color" style="background:#7c3aed"></div> 5 &ndash; 10</div>
      <div class="legend-row"><div class="legend-color" style="background:#dc2626"></div> &gt; 10</div>
    </div>
  </div>

  <!-- Summary strip -->
  <div id="summary-strip">
    <div class="summary-box">
      <div class="summary-icon">&#x2744;&#xFE0F;</div>
      <div><div class="summary-value" id="s-min" style="color:#3b82f6">&ndash;</div><div class="summary-label">Kylmin</div></div>
    </div>
    <div class="summary-box">
      <div class="summary-icon">&#x1F321;&#xFE0F;</div>
      <div><div class="summary-value" id="s-max" style="color:#ef4444">&ndash;</div><div class="summary-label">L&auml;mpimin</div></div>
    </div>
    <div class="summary-box">
      <div class="summary-icon">&#x1F4CA;</div>
      <div><div class="summary-value" id="s-avg" style="color:#f59e0b">&ndash;</div><div class="summary-label">Keskiarvo</div></div>
    </div>
    <div class="summary-box">
      <div class="summary-icon">&#x1F4A8;</div>
      <div><div class="summary-value" id="s-wind" style="color:#06b6d4">&ndash;</div><div class="summary-label">Max tuuli</div></div>
    </div>
  </div>
</div>

/* Finnish time */
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function getFinnishParts() {
  var now = new Date();
  var utcMs = now.getTime();
  var y = now.getUTCFullYear();
  var mar31 = new Date(Date.UTC(y, 2, 31));
  var lastSunMar = 31 - mar31.getUTCDay();
  var dstStart = Date.UTC(y, 2, lastSunMar, 1, 0, 0);
  var oct31 = new Date(Date.UTC(y, 9, 31));
  var lastSunOct = 31 - oct31.getUTCDay();
  var dstEnd = Date.UTC(y, 9, lastSunOct, 1, 0, 0);
  var offset = (utcMs >= dstStart && utcMs < dstEnd) ? 3 : 2;
  var fi = new Date(utcMs + offset * 3600000);
  return {
    hh: fi.getUTCHours(), mm: fi.getUTCMinutes(),
    dd: fi.getUTCDate(), mo: fi.getUTCMonth(),
    yy: fi.getUTCFullYear(), wd: fi.getUTCDay()
  };
}

function updateClock() {
  var p = getFinnishParts();
  document.getElementById('clock').textContent = pad2(p.hh) + ':' + pad2(p.mm);
  var days = ['sunnuntaina','maanantaina','tiistaina','keskiviikkona','torstaina','perjantaina','lauantaina'];
  var months = ['tammikuuta','helmikuuta','maaliskuuta','huhtikuuta','toukokuuta','kes\u00e4kuuta',
    'hein\u00e4kuuta','elokuuta','syyskuuta','lokakuuta','marraskuuta','joulukuuta'];
  document.getElementById('date-display').textContent = days[p.wd] + ' ' + p.dd + '. ' + months[p.mo] + ' ' + p.yy;
}
setInterval(updateClock, 1000);
updateClock();

/* Colors */
function tempToColor(t) {
  if (t < -20) return '#7c3aed';
  if (t < -10) return '#3b82f6';
  if (t < 0) return '#06b6d4';
  if (t < 10) return '#10b981';
  if (t < 20) return '#f59e0b';
  if (t < 30) return '#ef4444';
  return '#991b1b';
}

function rainToColor(mm) {
  if (mm <= 0) return '#94a3b8';
  if (mm <= 2) return '#38bdf8';
  if (mm <= 5) return '#2563eb';
  if (mm <= 10) return '#7c3aed';
  return '#dc2626';
}

/* Simplify station name */
function shortName(name) {
  if (!name) return '';
  return name
    .replace(/\s+(lentoasema|lentokentt\u00e4|satama|kirkonkyl\u00e4|keskusta|majakka|rautatieasema|Testausasema).*$/i, '')
    .replace(/\s+(Kaisaniemi|Kumpula|Harmaja|Isosaari|Artukainen|Rajakari|Kilpilahti).*$/i, '')
    .replace(/\s+Helsinki-Vantaan$/i, '')
    .split(' ')[0];
}

/* HTTP GET */
function httpGet(url, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 20000;
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) { callback(null, xhr.responseText); }
    else { callback(new Error('HTTP ' + xhr.status)); }
  };
  xhr.onerror = function() { callback(new Error('Verkkovirhe')); };
  xhr.ontimeout = function() { callback(new Error('Aikakatkaisu')); };
  xhr.send();
}

/* Fetch data */
function fetchData(done) {
  httpGet('data.json', function(err, text) {
    if (err) { done(false); return; }
    try {
      var data = JSON.parse(text);
      observationsData = [];
      var stations = data.stations || [];
      for (var i = 0; i < stations.length; i++) {
        if (stations[i].temperature != null) observationsData.push(stations[i]);
      }
      forecastData = data.forecast || null;
      done(true);
    } catch(e) { done(false); }
  });
}

/* Draw observations */
function drawObservations() {
  obsLayerGroup.clearLayers();
  var grid = {};
  var priority = ['Helsinki','Tampere','Turku','Oulu','Jyv\u00e4skyl\u00e4','Kuopio','Lahti','Rovaniemi',
    'Vaasa','Joensuu','Lappeenranta','Kouvola','Pori','H\u00e4meenlinna','Kajaani','Sodankyl\u00e4','Utsjoki',
    'Ivalo','Sein\u00e4joki','Mikkeli','Savonlinna','Kotka','Kokkola','Kemi','Maarianhamina','Inari','Enonteki\u00f6','Muonio'];

  var sorted = observationsData.slice().sort(function(a, b) {
    var ap = -1, bp = -1;
    for (var i = 0; i < priority.length; i++) {
      if (ap < 0 && (a.name || '').indexOf(priority[i]) >= 0) ap = i;
      if (bp < 0 && (b.name || '').indexOf(priority[i]) >= 0) bp = i;
    }
    if (ap >= 0 && bp < 0) return -1;
    if (bp >= 0 && ap < 0) return 1;
    if (ap >= 0 && bp >= 0) return ap - bp;
    return 0;
  });

  for (var i = 0; i < sorted.length; i++) {
    var obs = sorted[i];
    var gk = Math.round(obs.lat * 2) + ',' + Math.round(obs.lon);
    if (grid[gk]) continue;
    grid[gk] = obs;
  }

  var labelCities = ['Helsinki','Tampere','Turku','Oulu','Jyv\u00e4skyl\u00e4','Kuopio','Rovaniemi',
    'Vaasa','Joensuu','Lappeenranta','Pori','Kajaani','Sodankyl\u00e4','Utsjoki',
    'Sein\u00e4joki','Mikkeli','Kokkola','Kemi','Inari','Enonteki\u00f6','Lahti','Kotka'];

  for (var gkey in grid) {
    if (!grid.hasOwnProperty(gkey)) continue;
    var obs2 = grid[gkey];
    var color = tempToColor(obs2.temperature);
    var sname = shortName(obs2.name);
    var isKey = false;
    for (var c = 0; c < labelCities.length; c++) {
      if ((obs2.name || '').indexOf(labelCities[c]) >= 0) { isKey = true; break; }
    }
    var size = isKey ? 34 : 26;
    var fontSize = isKey ? '13px' : '10px';

    var html = '<div style="position:relative">';
    if (isKey && sname) html += '<div class="station-label">' + sname + '</div>';
    html += '<div class="station-marker" style="width:' + size + 'px;height:' + size + 'px;font-size:' + fontSize + ';background:' + color + '">';
    html += Math.round(obs2.temperature) + '\u00b0</div></div>';

    var icon = L.divIcon({ className: '', html: html, iconSize: [size, size], iconAnchor: [size / 2, size / 2] });
    L.marker([obs2.lat, obs2.lon], { icon: icon }).addTo(obsLayerGroup);
  }
}

/* Draw temperature forecast */
function drawForecastTemp() {
  fcTempGroup.clearLayers();
  if (!forecastData || !forecastData.temperature) return;
  var temps = forecastData.temperature;
  for (var i = 0; i < temps.length; i++) {
    var fc = temps[i];
    var color = tempToColor(fc.temperature);
    var size = 38;
    var html = '<div style="position:relative">';
    html += '<div class="fc-label">' + fc.name + '</div>';
    html += '<div class="fc-marker" style="width:' + size + 'px;height:' + size + 'px;font-size:14px;background:' + color + '">';
    html += Math.round(fc.temperature) + '\u00b0</div></div>';
    var icon = L.divIcon({ className: '', html: html, iconSize: [size, size], iconAnchor: [size / 2, size / 2] });
    L.marker([fc.lat, fc.lon], { icon: icon }).addTo(fcTempGroup);
  }
}

/* Draw precipitation forecast */
function drawForecastRain() {
  fcRainGroup.clearLayers();
  if (!forecastData || !forecastData.precipitation) return;
  var rains = forecastData.precipitation;
  for (var i = 0; i < rains.length; i++) {
    var fc = rains[i];
    var color = rainToColor(fc.precipitation);
    var size = 38;
    var label = fc.precipitation > 0 ? fc.precipitation.toFixed(1) : '0';
    var html = '<div style="position:relative">';
    html += '<div class="fc-label">' + fc.name + '</div>';
    html += '<div class="fc-marker" style="width:' + size + 'px;height:' + size + 'px;font-size:13px;background:' + color + '">';
    html += label + '</div></div>';
    var icon = L.divIcon({ className: '', html: html, iconSize: [size, size], iconAnchor: [size / 2, size / 2] });
    L.marker([fc.lat, fc.lon], { icon: icon }).addTo(fcRainGroup);
  }
}

/* Update forecast titles with time */
function updateForecastTitles() {
  if (!forecastData || !forecastData.time) return;
  var d = new Date(forecastData.time);
  var utcMs = d.getTime();
  var y = d.getUTCFullYear();
  var mar31 = new Date(Date.UTC(y, 2, 31));
  var lastSunMar = 31 - mar31.getUTCDay();
  var dstStart = Date.UTC(y, 2, lastSunMar, 1, 0, 0);
  var oct31 = new Date(Date.UTC(y, 9, 31));
  var lastSunOct = 31 - oct31.getUTCDay();
  var dstEnd = Date.UTC(y, 9, lastSunOct, 1, 0, 0);
  var offset = (utcMs >= dstStart && utcMs < dstEnd) ? 3 : 2;
  var fi = new Date(utcMs + offset * 3600000);
  var timeStr = pad2(fi.getUTCDate()) + '.' + pad2(fi.getUTCMonth() + 1) + '. klo ' + pad2(fi.getUTCHours()) + ':' + pad2(fi.getUTCMinutes());
  document.getElementById('fc-temp-title').innerHTML = '&#x1F525; L\u00e4mp\u00f6tilaennuste \u2014 ' + timeStr;
  document.getElementById('fc-rain-title').innerHTML = '&#x1F327;&#xFE0F; Sade 24h yhteens\u00e4 (mm)';
}

/* Summary */
function renderSummary() {
  if (!observationsData.length) return;
  var temps = [], winds = [];
  for (var i = 0; i < observationsData.length; i++) {
    if (observationsData[i].temperature != null) temps.push(observationsData[i].temperature);
    if (observationsData[i].windspeedms != null) winds.push(observationsData[i].windspeedms);
  }
  if (!temps.length) return;
  var minT = temps[0], maxT = temps[0], sumT = 0;
  for (var t = 0; t < temps.length; t++) {
    if (temps[t] < minT) minT = temps[t];
    if (temps[t] > maxT) maxT = temps[t];
    sumT += temps[t];
  }
  var avgT = sumT / temps.length;
  var maxW = 0;
  for (var w = 0; w < winds.length; w++) { if (winds[w] > maxW) maxW = winds[w]; }

  document.getElementById('s-min').textContent = minT.toFixed(1) + '\u00b0';
  document.getElementById('s-max').textContent = maxT.toFixed(1) + '\u00b0';
  document.getElementById('s-avg').textContent = avgT.toFixed(1) + '\u00b0';
  document.getElementById('s-wind').textContent = maxW.toFixed(1) + ' m/s';
}

/* Error */
function showError(msg) {
  var el = document.getElementById('error-bar');
  el.textContent = msg;
  el.className = 'visible';
  setTimeout(function() { el.className = ''; }, 30000);
}

/* Refresh */
function refreshAll() {
  document.getElementById('status-bar').textContent = 'P\u00e4ivitet\u00e4\u00e4n...';
  fetchData(function(ok) {
    if (ok && observationsData.length > 0) {
      drawObservations();
      renderSummary();
      drawForecastTemp();
      drawForecastRain();
      updateForecastTitles();
    } else {
      showError('Datan haku ep\u00e4onnistui');
    }
    var p = getFinnishParts();
    var statusText = 'P\u00e4ivitetty ' + pad2(p.hh) + ':' + pad2(p.mm);
    if (ok) statusText += ' | ' + observationsData.length + ' asemaa';
    document.getElementById('status-bar').textContent = statusText;
  });
}

/* Start */
function start() {
  try {
    initMaps();
    refreshAll();
    setInterval(refreshAll, 600000);
  } catch(e) {
    showError('Virhe: ' + e.message);
  }
}
start();
</script>
