<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1">
<title>Suomen Sääkartta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1080px; height:1920px; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:#101520; color:#e0e6ed; }
#app { width:1080px; height:1920px; display:flex; flex-direction:column; }

/* Header */
#header {
  height:90px; background:linear-gradient(135deg,#1a237e 0%,#0d47a1 50%,#01579b 100%);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 36px; flex-shrink:0;
  border-bottom:3px solid #4fc3f7;
  box-shadow:0 4px 20px #0008;
}
#header h1 { font-size:34px; font-weight:700; color:#fff; letter-spacing:1px; }
.header-right { text-align:right; }
.clock { font-size:42px; font-weight:300; color:#4fc3f7; font-variant-numeric:tabular-nums; }
.date { font-size:16px; color:#ffffffaa; margin-top:2px; }

/* Map */
#map-section { height:1200px; flex-shrink:0; position:relative; }
#map { width:100%; height:100%; }

.map-legend {
  position:absolute; bottom:16px; left:16px; z-index:1000;
  background:#101520ee; border:1px solid #2a323c; border-radius:12px;
  padding:14px 18px; font-size:15px; backdrop-filter:blur(8px);
}
.legend-title { font-weight:700; margin-bottom:8px; font-size:16px; color:#fff; }
.legend-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; color:#ccc; }
.legend-color { width:24px; height:16px; border-radius:4px; }

.status-overlay {
  position:absolute; top:16px; right:16px; z-index:1000;
  background:#101520dd; border:1px solid #2a323c; border-radius:8px;
  padding:8px 16px; font-size:14px; color:#a6adbb; backdrop-filter:blur(8px);
}
.fmi-credit {
  position:absolute; bottom:16px; right:16px; z-index:1000;
  background:#101520dd; border:1px solid #2a323c; border-radius:8px;
  padding:6px 14px; font-size:12px; color:#a6adbb88;
}

/* Info panel */
#info-panel {
  flex:1; display:flex; flex-direction:column;
  background:linear-gradient(180deg,#101520,#0c1018);
  border-top:3px solid #1a237e;
  min-height:0;
}

/* Summary */
#summary-strip {
  display:flex; height:160px; flex-shrink:0;
  border-bottom:2px solid #1a2030;
}
.summary-box {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-right:1px solid #1a2030; padding:16px 8px;
}
.summary-box:last-child { border-right:none; }
.summary-icon { font-size:28px; margin-bottom:4px; }
.summary-value { font-size:46px; font-weight:800; line-height:1.1; }
.summary-label { font-size:15px; color:#a6adbbaa; margin-top:6px; text-transform:uppercase; letter-spacing:2px; font-weight:600; }
.summary-detail { font-size:14px; color:#a6adbb77; margin-top:3px; }

/* Station markers */
.station-marker {
  border-radius:50%; border:2px solid #fff4;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#fff;
  text-shadow:0 1px 4px #000c;
  box-shadow:0 3px 10px #0006;
}
.station-label {
  position:absolute; top:-18px; left:50%; transform:translateX(-50%);
  white-space:nowrap; font-size:11px; font-weight:600;
  color:#fff; text-shadow:0 1px 4px #000, 0 0 8px #000;
  pointer-events:none;
}

/* Leaflet overrides */
.leaflet-popup-content-wrapper { background:#1d232a !important; color:#a6adbb !important; border-radius:10px !important; }
.leaflet-popup-tip { background:#1d232a !important; }

#error-bar { position:absolute; top:50px; left:50%; transform:translateX(-50%); z-index:1000;
  background:#ef444433; border:1px solid #ef4444; border-radius:8px;
  padding:10px 20px; font-size:14px; color:#ef4444; display:none; max-width:80%; text-align:center; }
#error-bar.visible { display:block; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>&#x1F1EB;&#x1F1EE; Suomen S&auml;&auml;kartta</h1>
    <div class="header-right">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date-display"></div>

    </div>
  </div>

  <div id="map-section">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-title">L&auml;mp&ouml;tila &deg;C</div>
      <div class="legend-row"><div class="legend-color" style="background:#7c3aed"></div> &lt; -20</div>
      <div class="legend-row"><div class="legend-color" style="background:#3b82f6"></div> -20 ... -10</div>
      <div class="legend-row"><div class="legend-color" style="background:#06b6d4"></div> -10 ... 0</div>
      <div class="legend-row"><div class="legend-color" style="background:#10b981"></div> 0 ... 10</div>
      <div class="legend-row"><div class="legend-color" style="background:#f59e0b"></div> 10 ... 20</div>

      <div class="legend-row"><div class="legend-color" style="background:#991b1b"></div> &gt; 30</div>

    <div class="status-overlay" id="status-bar">Ladataan havaintoja...</div>
    <div id="error-bar"></div>
    <div class="fmi-credit">L&auml;hde: Ilmatieteen laitos &ndash; Avoin data</div>

      <div class="summary-box">
        <div class="summary-icon">&#x1F4CA;</div>
        <div class="summary-value" id="s-avg" style="color:#f59e0b">&ndash;</div>
        <div class="summary-label">Keskiarvo</div>
        <div class="summary-detail" id="s-stations"></div>

      <div class="summary-box">
        <div class="summary-icon">&#x1F4A8;</div>

      </div>
    </div>

</div>

/* Finnish time — uses Intl timezone for automatic DST */
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function getFinnishParts() {
  var now = new Date();
  var utcMs = now.getTime();
  var y = now.getUTCFullYear();
  /* Last Sunday of March — DST starts at 01:00 UTC */
  var mar31 = new Date(Date.UTC(y, 2, 31));
  var lastSunMar = 31 - mar31.getUTCDay();
  var dstStart = Date.UTC(y, 2, lastSunMar, 1, 0, 0);
  /* Last Sunday of October — DST ends at 01:00 UTC */
  var oct31 = new Date(Date.UTC(y, 9, 31));
  var lastSunOct = 31 - oct31.getUTCDay();
  var dstEnd = Date.UTC(y, 9, lastSunOct, 1, 0, 0);
  /* EEST = UTC+3 in summer, EET = UTC+2 in winter */
  var offset = (utcMs >= dstStart && utcMs < dstEnd) ? 3 : 2;
  var fi = new Date(utcMs + offset * 3600000);
  return {
    hh: fi.getUTCHours(),
    mm: fi.getUTCMinutes(),
    dd: fi.getUTCDate(),
    mo: fi.getUTCMonth(),
    yy: fi.getUTCFullYear(),
    wd: fi.getUTCDay()
  };
}

function updateClock() {
  var p = getFinnishParts();
  document.getElementById('clock').textContent = pad2(p.hh) + ':' + pad2(p.mm);

  var days = ['sunnuntaina','maanantaina','tiistaina','keskiviikkona','torstaina','perjantaina','lauantaina'];
  var months = ['tammikuuta','helmikuuta','maaliskuuta','huhtikuuta','toukokuuta','kes\u00e4kuuta',
    'hein\u00e4kuuta','elokuuta','syyskuuta','lokakuuta','marraskuuta','joulukuuta'];
  document.getElementById('date-display').textContent = days[p.wd] + ' ' + p.dd + '. ' + months[p.mo] + ' ' + p.yy;
}
setInterval(updateClock, 1000);
updateClock();

/* Temp color */
function tempToColor(t) {
  if (t < -20) return '#7c3aed';
  if (t < -10) return '#3b82f6';
  if (t < 0) return '#06b6d4';
  if (t < 10) return '#10b981';
  if (t < 20) return '#f59e0b';
  if (t < 30) return '#ef4444';
  return '#991b1b';
}

/* Simplify station name */
function shortName(name) {
  if (!name) return '';
  return name
    .replace(/\s+(lentoasema|lentokentt\u00e4|satama|kirkonkyl\u00e4|keskusta|majakka|rautatieasema|Testausasema).*$/i, '')
    .replace(/\s+(Kaisaniemi|Kumpula|Harmaja|Isosaari|Artukainen|Rajakari|Kilpilahti).*$/i, '')
    .replace(/\s+Helsinki-Vantaan$/i, '')
    .split(' ')[0];
}

/* Init map */

  map = L.map('map', {
    center: [64.8, 26], zoom: 5.6,
    zoomControl: false, attributionControl: false,
    dragging: false, scrollWheelZoom: false,
    doubleClickZoom: false, touchZoom: false, keyboard: false
  });
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
  L.geoJSON(FINLAND_GEOJSON, {
    style: { color:'#4fc3f7', weight:2.5, opacity:0.8, fillColor:'#1a237e', fillOpacity:0.15, dashArray:'8 4' }
  }).addTo(map);
  obsLayerGroup = L.layerGroup().addTo(map);
}

/* HTTP GET via XMLHttpRequest only (maximum compatibility) */
function httpGet(url, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 20000;
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      callback(null, xhr.responseText);
    } else {
      callback(new Error('HTTP ' + xhr.status));
    }
  };
  xhr.onerror = function() { callback(new Error('Verkkovirhe')); };
  xhr.ontimeout = function() { callback(new Error('Aikakatkaisu')); };
  xhr.send();
}

/* Fetch observations from pre-generated data.json (same origin) */
function fetchObservations(done) {
  httpGet('data.json', function(err, text) {
    if (err) { done(false); return; }
    try {
      var data = (typeof JSON !== 'undefined' && JSON.parse) ? JSON.parse(text) : eval('(' + text + ')');
      observationsData = [];
      var stations = data.stations || [];
      for (var i = 0; i < stations.length; i++) {
        if (stations[i].temperature != null) {
          observationsData.push(stations[i]);
        }
      }
      done(true);
    } catch(e) {
      done(false);
    }
  });
}

    var ap = -1, bp = -1;
    for (var i = 0; i < priority.length; i++) {
      if (ap < 0 && (a.name || '').indexOf(priority[i]) >= 0) ap = i;
      if (bp < 0 && (b.name || '').indexOf(priority[i]) >= 0) bp = i;
    }
    if (ap >= 0 && bp < 0) return -1;
    if (bp >= 0 && ap < 0) return 1;
    if (ap >= 0 && bp >= 0) return ap - bp;
    return 0;
  });

  for (var i = 0; i < sorted.length; i++) {
    var obs = sorted[i];
    var gk = Math.round(obs.lat * 2) + ',' + Math.round(obs.lon);
    if (grid[gk]) continue;
    grid[gk] = obs;
  }

  var labelCities = ['Helsinki','Tampere','Turku','Oulu','Jyv\u00e4skyl\u00e4','Kuopio','Rovaniemi',
    'Vaasa','Joensuu','Lappeenranta','Pori','H\u00e4meenlinna','Kajaani','Sodankyl\u00e4','Utsjoki',
    'Sein\u00e4joki','Mikkeli','Kokkola','Kemi','Inari','Enonteki\u00f6','Savonlinna','Lahti','Kotka'];

  for (var gkey in grid) {
    if (!grid.hasOwnProperty(gkey)) continue;
    var obs2 = grid[gkey];
    var color = tempToColor(obs2.temperature);
    var sname = shortName(obs2.name);
    var isKey = false;
    for (var c = 0; c < labelCities.length; c++) {
      if ((obs2.name || '').indexOf(labelCities[c]) >= 0) { isKey = true; break; }
    }
    var size = isKey ? 36 : 28;
    var fontSize = isKey ? '14px' : '11px';

    var html = '<div style="position:relative">';
    if (isKey && sname) html += '<div class="station-label">' + sname + '</div>';
    html += '<div class="station-marker" style="width:' + size + 'px;height:' + size + 'px;font-size:' + fontSize + ';background:' + color + '">';
    html += Math.round(obs2.temperature) + '\u00b0</div></div>';

    var icon = L.divIcon({
      className: '',
      html: html,
      iconSize: [size, size],
      iconAnchor: [size / 2, size / 2]
    });
    L.marker([obs2.lat, obs2.lon], { icon: icon }).addTo(obsLayerGroup);
  }
}

/* Summary */
function renderSummary() {
  if (!observationsData.length) return;
  var temps = [], winds = [];
  for (var i = 0; i < observationsData.length; i++) {
    if (observationsData[i].temperature != null) temps.push(observationsData[i].temperature);
    if (observationsData[i].windspeedms != null) winds.push(observationsData[i].windspeedms);
  }
  if (!temps.length) return;

  var minT = temps[0], maxT = temps[0], sumT = 0;
  for (var t = 0; t < temps.length; t++) {
    if (temps[t] < minT) minT = temps[t];
    if (temps[t] > maxT) maxT = temps[t];
    sumT += temps[t];
  }
  var avgT = sumT / temps.length;
  var maxW = 0;
  for (var w = 0; w < winds.length; w++) {
    if (winds[w] > maxW) maxW = winds[w];
  }

  var coldest = null, warmest = null, windiest = null;
  for (var s = 0; s < observationsData.length; s++) {
    if (observationsData[s].temperature === minT && !coldest) coldest = observationsData[s];
    if (observationsData[s].temperature === maxT && !warmest) warmest = observationsData[s];
    if (observationsData[s].windspeedms === maxW && !windiest) windiest = observationsData[s];
  }

  document.getElementById('s-min').textContent = minT.toFixed(1) + '\u00b0';
  document.getElementById('s-max').textContent = maxT.toFixed(1) + '\u00b0';
  document.getElementById('s-avg').textContent = avgT.toFixed(1) + '\u00b0';
  document.getElementById('s-wind').textContent = maxW.toFixed(1) + ' m/s';
  document.getElementById('s-min-loc').textContent = coldest ? shortName(coldest.name) : '';
  document.getElementById('s-max-loc').textContent = warmest ? shortName(warmest.name) : '';
  document.getElementById('s-stations').textContent = observationsData.length + ' asemaa';
  document.getElementById('s-wind-loc').textContent = windiest ? shortName(windiest.name) : '';
}

/* Show error */
function showError(msg) {
  var el = document.getElementById('error-bar');
  el.textContent = msg;
  el.className = 'visible';
  setTimeout(function() { el.className = ''; }, 30000);
}

/* Refresh */
function refreshAll() {
  document.getElementById('status-bar').textContent = 'P\u00e4ivitet\u00e4\u00e4n...';

  fetchObservations(function(obsOk) {
    if (obsOk && observationsData.length > 0) {
      drawObservations();
      renderSummary();
    } else {
      showError('Havaintodatan haku ep\u00e4onnistui');
    }

    var p = getFinnishParts();
    var timeStr = pad2(p.hh) + ':' + pad2(p.mm);
    var statusText = 'P\u00e4ivitetty ' + timeStr;
    if (obsOk) {
      statusText += ' | ' + observationsData.length + ' asemaa';
    } else {
      statusText += ' | Havainnot: virhe';
    }
    document.getElementById('status-bar').textContent = statusText;
  });
}

/* Start */
function start() {
  try {
    initMap();
  } catch(e) {
    return;
  }
  refreshAll();
  setInterval(refreshAll, 10 * 60 * 1000);
}

window.onerror = function() { return true; };
start();
</script>
